name: Update SNL Schedule

on:
  schedule:
    # Daily at 09:00 UTC (≈ 4-5am ET, after Saturday's broadcast)
    - cron: "0 9 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.0.2
        with:
          python-version: "3.14"

      - name: Run updater
        id: update
        run: python scripts/update_schedule.py

      - name: Create pull request
        if: steps.update.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # 8.1.1
        with:
          commit-message: |
            chore(schedule): sync season ${{ steps.update.outputs.season }} from TVMaze

            +${{ steps.update.outputs.added_count }} added,
            ~${{ steps.update.outputs.changed_count }} changed
          title: "Sync SNL Season ${{ steps.update.outputs.season }} schedule"
          body-path: CHANGES.md
          branch: chore/snl-schedule-update
          delete-branch: true
          labels: |
            automated
            schedule-update
          add-paths: |
            index.html

      - name: Cleanup CHANGES.md
        if: always()
        run: rm -f CHANGES.md
